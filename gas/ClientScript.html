<script>
(function () {
  'use strict';

  /* ── DOM helper ──────────────────────────────────────────────────── */
  var $ = function (id) { return document.getElementById(id); };

  /* ── App state ───────────────────────────────────────────────────── */
  var activeTabId       = 'EXEC_ESCALATIONS';  // main tab
  var activeHeaderTabId = 'ESCALATION_MANAGEMENT'; // level-1 header tab
  var activeCufSub      = 'CUF_P0_P1';          // CUF sub-tab
  var activePeriod      = '3M';
  var chartInstance     = null;
  var analyticsInited   = false;
  var selectedRowId     = null;
  var ageIntervalId     = null;
  var commsPanelCleanup = null;
  var filterPopupCleanup = null;
  var currentPage       = 1;
  var PAGE_SIZE         = 10;
  var sortState         = { col: '_status', dir: 'asc' };
  var colFilters        = {};         // { [colKey]: filterString }
  var filterPopupCol    = null;       // which col the popup is open for
  var _allRows          = [];         // raw data from hook

  /* ── Per-column widths for table-layout:fixed colgroup ──────────
     Columns NOT listed here get no width attribute → share remaining
     space (subject, pir_doc, ir_doc, cisr_doc, is_doc).
  ─────────────────────────────────────────────────────────────── */
  var _COL_WIDTHS = {
    bug_id:                   '86px',
    iem_escalation_number:    '86px',
    omg_id:                   '86px',
    current_assignee_ldap:    '96px',
    product_name:             '86px',
    priority:                 '62px',
    severity:                 '62px',
    customer_name:            '106px',
    last_update:              '130px',
    _fmr:                     '62px',
    _age:                     '82px',
    _status:                  '106px',
    _impact:                  '74px',
    brisk_url:                '82px',
    psh_url:                  '82px',
    psh_csh:                  '82px',
    meta_bug:                 '82px',
    slo_yn:                   '56px',
    ttfvp:                    '62px',
    ttfap:                    '62px',
    ttdir:                    '62px',
    start_time:               '90px'
    // subject, pir_doc, ir_doc, cisr_doc, is_doc → no explicit width (flex fill)
  };

  /* ── Centralized active-row predicate (single source of truth) ── */
  function isActiveRow(r) {
    return !r.closed_timestamp || String(r.closed_timestamp).trim() === '';
  }
  function countActiveRows(rows) {
    return rows.filter(isActiveRow).length;
  }

  /* ── Default sort state factory ──────────────────────────────── */
  var _DEFAULT_SORT = { col: '_status', dir: 'asc' };

  /* ── Column definitions are config-driven (from TAB_UTILS) ─────── */
  function getActiveColDefs() {
    var ctx = TAB_UTILS.resolveTabContext(getFilterKey());
    return (ctx && ctx.columns && ctx.columns.length) ? ctx.columns : _ESC_COLS;
  }
  // Keep COL_DEFS as a live getter for backward compat
  Object.defineProperty(window, 'COL_DEFS_COMPAT', { get: getActiveColDefs });

  /* ── Tab registry (derived from TABS_CONFIG) ─────────────────────── */
  var TABS = (function() {
    var all = [];
    Object.keys(TABS_CONFIG).forEach(function(hk) {
      TABS_CONFIG[hk].children.forEach(function(sub) { all.push({ id:sub.id, label:sub.label.toUpperCase(), chartTitle:'IEM — ' + sub.label }); });
    });
    return all;
  }());
  var CUF_SUBS = (TABS_CONFIG.ESCALATION_MANAGEMENT.children.filter(function(c){ return c.id === 'CUF_ESCALATIONS'; })[0]||{children:[]}).children.map(function(c){ return { id:c.id, chartTitle:'IEM Escalations — ' + c.label }; });

  /* ── Returns the filter key for the currently active view ─────── */
  function getFilterKey() {
    if (activeTabId === 'CUF_ESCALATIONS') return activeCufSub;
    return activeTabId || activeHeaderTabId;
  }

  /* ── Render sub-tab cards (level 2) ─────────────────────────────── */
  function renderSubTabCards() {
    var container = $('subTabCardsBar');
    if (!container) return;

    var hcfg = TABS_CONFIG[activeHeaderTabId];
    if (!hcfg || !hcfg.children) { container.innerHTML = ''; return; }

    container.innerHTML = hcfg.children.map(function (child) {
      var isActive = activeTabId === child.id;
      var filterKey = child.id;
      // For CUF parent, count all CUF rows
      var filter = TAB_FILTERS[filterKey] || function(){ return true; };
      var activeCount = _allRows.filter(function(r){ return filter(r) && isActiveRow(r); }).length;
      var totalCount = _allRows.filter(filter).length;
      var iconStr = child.icon || '●';
      return '<button class="subtab-card' + (isActive ? ' active' : '') + '" ' +
        'role="tab" aria-selected="' + (isActive ? 'true' : 'false') + '" ' +
        'data-tab="' + child.id + '">' +
        '<div class="stc-icon">' + iconStr + '</div>' +
        '<div class="stc-body">' +
          '<div class="stc-name">' + esc(child.label) + '</div>' +
          '<div class="stc-meta">' + activeCount + ' active' + (totalCount ? ' / ' + totalCount : '') + '</div>' +
        '</div>' +
      '</button>';
    }).join('');

    container.querySelectorAll('.subtab-card').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var tid = btn.dataset.tab;
        var tabCfg = TAB_UTILS.lookup(tid);
        // If this tab has children, switch to first child
        if (tabCfg && tabCfg.node.children && tabCfg.node.children.length) {
          activeTabId = tid;
          renderSubTabCards();
          var nested = $('nestedTabBar');
          if (nested) nested.style.display = '';
          switchCufSub(tabCfg.node.children[0].id);
        } else {
          switchTab(tid);
        }
      });
    });
  }

  /* ── useClickOutside ─────────────────────────────────────────────
     Calls `callback` when any click lands outside every el in `els`.
     Returns a cleanup function.
  ──────────────────────────────────────────────────────────────── */
  function useClickOutside(els, callback) {
    function handler(e) {
      var outside = els.every(function (el) { return el && !el.contains(e.target); });
      if (outside) { callback(); document.removeEventListener('click', handler, true); }
    }
    setTimeout(function () { document.addEventListener('click', handler, true); }, 0);
    return function cleanup() { document.removeEventListener('click', handler, true); };
  }

  /* ── Utility: escape HTML ────────────────────────────────────── */
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* ── Utility: timeAgo ────────────────────────────────────────── */
  function timeAgo(iso) {
    if (!iso) return '—';
    var diff = Math.max(0, Date.now() - new Date(iso).getTime());
    var m = Math.floor(diff / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  /* ── Utility: formatTs ───────────────────────────────────────── */
  function formatTs(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleString('en-US', {
        month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false
      });
    } catch (e) { return iso; }
  }

  /* ── FMR colour class ────────────────────────────────────────── */
  function fmrClass(mins) {
    var m = Number(mins);
    if (isNaN(m)) return '';
    if (m <=  5) return 'fmr-good';
    if (m <= 15) return 'fmr-warn';
    return 'fmr-bad';
  }

  /* ── Priority badge ──────────────────────────────────────────── */
  function priorityBadge(p) {
    var cls = p === 'P0' ? 'badge-sev-p0'
            : p === 'P1' ? 'badge-sev-p1'
            : 'badge-sev-other';
    return '<span class="badge ' + cls + '">' + esc(p) + '</span>';
  }

  /* ── Status cell ─────────────────────────────────────────────── */
  function statusCell(status) {
    var isActive = (status === 'In Progress' || status === 'Investigating' || status === 'Monitoring' || status === 'Customer Update Pending');
    var dotCls   = isActive ? '' : 'static';
    return '<div class="status-cell"><span class="pulse-dot ' + dotCls + '"></span>' + esc(status) + '</div>';
  }

  /* ── Customer tier derivation ───────────────────────────────── */
  function deriveTier(row) {
    var p = String(row.priority || '').toUpperCase().trim();
    return (p === 'P0') ? 'Strategic' : 'Enterprise';
  }

  /* ── Status sort priority (lower = shown first when dir=asc) ──── */
  var _STATUS_PRIORITY = {
    'In Progress': 0, 'Investigating': 0, 'Monitoring': 0,
    'Customer Update Pending': 0,
    'Unknown': 1,
    'Closed': 2
  };
  function statusSortVal(row) {
    var s = row._status || deriveStatus(row);
    var p = _STATUS_PRIORITY[s];
    return p !== undefined ? p : 1;
  }

  /* ── Sort value extractor ────────────────────────────────────── */
  function sortVal(row, col) {
    if (col === '_status') return statusSortVal(row);
    if (col === '_age')    return row._ageHours != null ? row._ageHours : -1;
    if (col === '_fmr')    return Number(row._fmrMins) || 0;
    if (col === 'created_timestamp') return new Date(row.created_timestamp).getTime() || 0;
    return String(row[col] || '').toLowerCase();
  }

  /* ══════════════════════════════════════════════════════════════════
     COLUMN HEADER INIT
     Generates <th> elements with sort (3-state) and filter (funnel)
     icon buttons for every column defined in COL_DEFS.
  ══════════════════════════════════════════════════════════════════ */
  function initColumnHeaders() {
    var tr    = $('tableHeaderRow');
    var table = $('liveEscTable');
    if (!tr) return;

    var cols = getActiveColDefs();

    // Build/update <colgroup> so table-layout:fixed distributes widths correctly
    if (table) {
      var cg = table.querySelector('colgroup');
      if (!cg) { cg = document.createElement('colgroup'); table.insertBefore(cg, table.firstChild); }
      cg.innerHTML = cols.map(function (col) {
        var w = _COL_WIDTHS[col.key] || '';
        return '<col' + (w ? ' style="width:' + w + '"' : '') + '>';
      }).join('');
    }

    tr.innerHTML = cols.map(function (col) {
      var sortBtns = col.sortable
        ? '<button class="th-sort-btn s-unsorted" data-sort-col="' + col.key + '" aria-label="Sort by ' + col.label + '" title="Sort">' +
            /* unsorted icon */ '<svg class="ic-sort-un" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 9l4-4 4 4"/><path d="M16 15l-4 4-4-4"/></svg>' +
            /* asc icon */      '<svg class="ic-sort-asc" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5l-7 7h14z"/></svg>' +
            /* desc icon */     '<svg class="ic-sort-desc" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19l7-7H5z"/></svg>' +
          '</button>'
        : '';
      var filterBtn = '<button class="th-filter-btn" data-filter-col="' + col.key + '" aria-label="Filter ' + col.label + '" title="Filter">' +
          '<svg class="ic-filter" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>' +
        '</button>';
      return '<th class="th-col"><div class="th-inner"><span class="th-label">' + esc(col.label) + '</span><div class="th-btns">' + sortBtns + filterBtn + '</div></div></th>';
    }).join('');

    // Wire sort buttons
    tr.querySelectorAll('.th-sort-btn').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        handleSortClick(btn.dataset.sortCol);
      });
    });

    // Wire filter buttons
    tr.querySelectorAll('.th-filter-btn').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        openFilterPopup(btn.dataset.filterCol, btn);
      });
    });

    updateSortIcons();
  }

  /* ── Sort ─────────────────────────────────────────────────────── */
  function handleSortClick(col) {
    if (sortState.col === col) {
      // cycle: asc → desc → null (default created_timestamp desc)
      if (sortState.dir === 'asc')  { sortState.dir = 'desc'; }
      else if (sortState.dir === 'desc') { sortState = { col: 'created_timestamp', dir: 'desc' }; }
    } else {
      sortState = { col: col, dir: 'asc' };
    }
    updateSortIcons();
    currentPage = 1;
    renderIncidentTable();
  }

  function updateSortIcons() {
    var tr = $('tableHeaderRow');
    if (!tr) return;
    tr.querySelectorAll('.th-sort-btn').forEach(function (btn) {
      var col = btn.dataset.sortCol;
      btn.classList.remove('s-unsorted', 's-asc', 's-desc');
      if (sortState.col === col) {
        btn.classList.add(sortState.dir === 'asc' ? 's-asc' : 's-desc');
      } else {
        btn.classList.add('s-unsorted');
      }
    });
  }

  /* ── Column filter popup ─────────────────────────────────────── */
  function openFilterPopup(colKey, triggerBtn) {
    // If same column popup already open → close it
    if (filterPopupCol === colKey && $('colFilterPopup').style.display !== 'none') {
      closeFilterPopup();
      return;
    }
    filterPopupCol = colKey;

    var popup = $('colFilterPopup');
    var input = $('colFilterInput');
    if (!popup || !input) return;

    // Position fixed relative to trigger button
    var rect = triggerBtn.getBoundingClientRect();
    popup.style.top  = (rect.bottom + 4) + 'px';
    popup.style.left = Math.min(rect.left, window.innerWidth - 220) + 'px';
    popup.style.display = '';

    input.value = colFilters[colKey] || '';
    input.focus();

    // Highlight the active filter button
    updateFilterIcons();

    if (filterPopupCleanup) filterPopupCleanup();
    filterPopupCleanup = useClickOutside([popup, triggerBtn], closeFilterPopup);
  }

  function closeFilterPopup() {
    var popup = $('colFilterPopup');
    if (popup) popup.style.display = 'none';
    filterPopupCol = null;
    if (filterPopupCleanup) { filterPopupCleanup(); filterPopupCleanup = null; }
  }

  function initFilterPopup() {
    var input   = $('colFilterInput');
    var clearBtn = $('colFilterClearBtn');
    if (!input || !clearBtn) return;

    input.addEventListener('input', function () {
      if (filterPopupCol) {
        colFilters[filterPopupCol] = input.value;
        updateFilterIcons();
        currentPage = 1;
        renderIncidentTable();
      }
    });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { closeFilterPopup(); }
      e.stopPropagation();
    });
    clearBtn.addEventListener('click', function () {
      if (filterPopupCol) {
        colFilters[filterPopupCol] = '';
        input.value = '';
        updateFilterIcons();
        currentPage = 1;
        renderIncidentTable();
      }
    });
  }

  function updateFilterIcons() {
    var tr = $('tableHeaderRow');
    if (!tr) return;
    tr.querySelectorAll('.th-filter-btn').forEach(function (btn) {
      var col = btn.dataset.filterCol;
      btn.classList.toggle('f-active', !!(colFilters[col] && colFilters[col].length > 0));
    });
  }

  /* ══════════════════════════════════════════════════════════════════
     DYNAMIC CELL RENDERER
     Produces a <td> string for any column key.
  ══════════════════════════════════════════════════════════════════ */
  function _renderCell(col, r, ageCls, status) {
    var k = col.key;
    // ── Special computed columns ─────────────────────────────────
    if (k === '_status') {
      return '<td>' + statusCell(status) + '</td>';
    }
    if (k === '_age') {
      return '<td><span class="age-cell' + (ageCls || '') + '">' + esc(formatResolutionAge(r._ageHours)) + '</span></td>';
    }
    if (k === '_fmr') {
      return '<td><span class="fmr-cell ' + fmrClass(r._fmrMins) + '">' + esc(formatFmr(r._fmrMins)) + '</span></td>';
    }
    if (k === '_impact') {
      return '<td class="td-impact">' + esc(r.impact || '—') + '</td>';
    }
    // ── bug_id — buganizer link ───────────────────────────────────
    if (k === 'bug_id') {
      var numId = esc(String(r.bug_id || '').replace(/^b\//i, ''));
      return '<td class="bold mono"><a class="rd-id" href="https://b.corp.google.com/issues/' + numId +
        '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(r.bug_id) + '</a></td>';
    }
    // ── IEM escalation number ─────────────────────────────────────
    if (k === 'iem_escalation_number') {
      return '<td class="mono">' + esc(r.iem_escalation_number) + '</td>';
    }
    // ── LDAP owner ───────────────────────────────────────────────
    if (k === 'current_assignee_ldap') {
      return '<td class="bold">' + esc(r.current_assignee_ldap) + '</td>';
    }
    // ── Priority / severity badge ─────────────────────────────────
    if (k === 'priority') {
      return '<td>' + priorityBadge(r.priority) + '</td>';
    }
    if (k === 'severity') {
      return '<td>' + priorityBadge(r.severity) + '</td>';
    }
    // ── Subject (truncate with title) ─────────────────────────────
    if (k === 'subject') {
      return '<td class="td-subject" title="' + esc(r.subject) + '">' + esc(r.subject) + '</td>';
    }
    // ── Last update (muted + title) ───────────────────────────────
    if (k === 'last_update') {
      return '<td class="td-update muted" title="' + esc(r.last_update) + '">' + esc(r.last_update) + '</td>';
    }
    // ── URL columns — render as clickable link if non-empty ───────
    if (k === 'brisk_url' || k === 'psh_url' || k === 'psh_csh') {
      var url = String(r[k] || '').trim();
      if (url && (url.indexOf('http') === 0 || url.indexOf('//') === 0)) {
        return '<td><a class="rd-id" href="' + esc(url) + '" target="_blank" rel="noopener" ' +
          'onclick="event.stopPropagation()" title="' + esc(url) + '">' +
          esc(url.length > 28 ? url.slice(0, 26) + '…' : url) + '</a></td>';
      }
      return '<td class="muted">' + esc(url || '—') + '</td>';
    }
    // ── Meta bug — buganizer link ─────────────────────────────────
    if (k === 'meta_bug') {
      var mb = String(r.meta_bug || '').trim();
      if (mb) {
        var mbNum = mb.replace(/^b\//i, '');
        return '<td class="mono"><a class="rd-id" href="https://b.corp.google.com/issues/' + esc(mbNum) +
          '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(mb) + '</a></td>';
      }
      return '<td class="muted">—</td>';
    }
    // ── SLO Y/N — colour-coded ────────────────────────────────────
    if (k === 'slo_yn') {
      var slo = String(r.slo_yn || '').trim().toUpperCase();
      var sloCls = slo === 'Y' ? 'fmr-good' : slo === 'N' ? 'fmr-bad' : '';
      return '<td>' + (slo ? '<span class="fmr-cell ' + sloCls + '">' + esc(slo) + '</span>' : '<span class="muted">—</span>') + '</td>';
    }
    // ── Generic fallback ─────────────────────────────────────────
    var val = r[k];
    return '<td>' + esc(val == null || val === '' ? '—' : val) + '</td>';
  }

  /* ══════════════════════════════════════════════════════════════════
     INCIDENT TABLE RENDER
  ══════════════════════════════════════════════════════════════════ */
  function getActiveRows() {
    var filterKey = getFilterKey();
    var filter    = TAB_FILTERS[filterKey];
    return _allRows.filter(filter || function () { return true; });
  }

  function renderIncidentTable() {
    var tbody = $('liveEscTbody');
    if (!tbody) return;

    var rows = getActiveRows();

    // 1. Compute derived fields: _status, _ageHours, _fmrMins
    rows = rows.map(function (r) {
      var ageHours = computeEscalationAge(r);
      // FMR: prefer p0_time_to_first_update_mins, fall back to time_to_first_update_mins
      var fmrMins  = r.p0_time_to_first_update_mins != null && r.p0_time_to_first_update_mins !== ''
        ? Number(r.p0_time_to_first_update_mins)
        : Number(r.time_to_first_update_mins) || null;
      return Object.assign({}, r, {
        _status:   deriveStatus(r),
        _ageHours: ageHours,
        _fmrMins:  fmrMins
      });
    });

    // 2. Apply column filters
    var _colDefs = getActiveColDefs();
    rows = rows.filter(function (r) {
      return _colDefs.every(function (col) {
        var f = (colFilters[col.key] || '').toLowerCase().trim();
        if (!f) return true;
        var val = col.key === '_age'    ? formatResolutionAge(r._ageHours)
                : col.key === '_fmr'    ? formatFmr(r._fmrMins)
                : col.key === '_status' ? r._status
                : col.key === '_impact' ? (r.impact || '—')
                : String(r[col.key] || '');
        return val.toLowerCase().indexOf(f) !== -1;
      });
    });

    // 3. Sort: Strategic tier (P0) always first, then user sort within tier
    rows = rows.slice().sort(function (a, b) {
      var ta = deriveTier(a), tb = deriveTier(b);
      if (ta !== tb) return ta === 'Strategic' ? -1 : 1;
      var av = sortVal(a, sortState.col);
      var bv = sortVal(b, sortState.col);
      var cmp = (typeof av === 'number' && typeof bv === 'number')
        ? av - bv
        : String(av).localeCompare(String(bv));
      return sortState.dir === 'asc' ? cmp : -cmp;
    });

    // 4. Paginate
    var totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;
    var start     = (currentPage - 1) * PAGE_SIZE;
    var pageItems = rows.slice(start, start + PAGE_SIZE);

    updatePaginationBar(currentPage, totalPages, rows.length, start, pageItems.length);

    // 5. Render rows with tier group headers
    if (!pageItems.length) {
      var hasFilter = Object.keys(colFilters).some(function (k) { return colFilters[k]; });
      tbody.innerHTML = '<tr class="empty-row"><td colspan="' + _colDefs.length + '">' +
        (hasFilter ? 'No results match the current filters.' : 'No escalations for this category.') +
        '</td></tr>';
      return;
    }

    // Pre-compute tier counts for group headers
    var tierCounts = {};
    pageItems.forEach(function (r) {
      var t = deriveTier(r);
      tierCounts[t] = (tierCounts[t] || 0) + 1;
    });

    var html = '';
    var currentTier = null;
    pageItems.forEach(function (r) {
      var status = r._status;
      var tier   = deriveTier(r);

      // Inject tier group header when tier changes
      if (tier !== currentTier) {
        currentTier = tier;
        var tierIcon = tier === 'Strategic' ? '★' : '◆';
        html += '<tr class="tier-group-header"><td colspan="' + _colDefs.length + '">' +
          '<span class="tier-icon">' + tierIcon + '</span>' +
          '<span class="tier-label">' + esc(tier) + '</span>' +
          '<span class="tier-count">' + tierCounts[tier] + ' escalation' + (tierCounts[tier] !== 1 ? 's' : '') + '</span>' +
          '</td></tr>';
      }

      // Row class: P0 active → pulse animation; Closed → dim
      var isPulse  = r.priority === 'P0' && status !== 'Closed';
      var isClosed = status === 'Closed';
      var rowCls   = isPulse ? 'row-pulse-p0' : isClosed ? 'row-dim' : '';
      if (selectedRowId === r.bug_id) rowCls = (rowCls ? rowCls + ' ' : '') + 'selected';

      // Age heatmap class
      var ageDays = r._ageHours != null ? r._ageHours / 24 : 0;
      var ageCls  = (status !== 'Closed' && r._ageHours != null)
        ? (ageDays > 7 ? ' age-critical' : ageDays > 3 ? ' age-warn' : ' age-active')
        : '';

      html +=
        '<tr data-id="' + esc(r.bug_id) + '" data-created="' + esc(r.created_timestamp) + '"' +
        ' tabindex="0"' + (rowCls ? ' class="' + rowCls + '"' : '') + '>' +
        _colDefs.map(function(col) { return _renderCell(col, r, ageCls, status); }).join('') +
        '</tr>';
    });
    tbody.innerHTML = html;

    // Row click → open comms panel
    tbody.querySelectorAll('tr[data-id]').forEach(function (row) {
      row.addEventListener('click', function (e) {
        if (e.target.closest('a')) return;
        selectRow(row.dataset.id);
      });
      row.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.target.closest('a')) selectRow(row.dataset.id);
      });
    });
  }

  /* ── Row selection + inline comms ───────────────────────────── */
  function selectRow(bugId) {
    selectedRowId = bugId;
    var tbody = $('liveEscTbody');
    if (tbody) tbody.querySelectorAll('tr[data-id]').forEach(function (r) {
      r.classList.toggle('selected', r.dataset.id === bugId);
    });
    renderInlineComms(bugId);

    if (commsPanelCleanup) commsPanelCleanup();
    commsPanelCleanup = useClickOutside(
      [$('liveEscCard'), $('commsPanel')],
      closeCommsPanel
    );
  }

  function closeCommsPanel() {
    var panel = $('commsPanel');
    if (panel) panel.innerHTML = '';
    selectedRowId = null;
    var tbody = $('liveEscTbody');
    if (tbody) tbody.querySelectorAll('tr[data-id]').forEach(function (r) { r.classList.remove('selected'); });
    if (commsPanelCleanup) { commsPanelCleanup(); commsPanelCleanup = null; }
  }

  /* ── Deep-link from notification: navigate tab → select row ─── */
  function navigateToIncident(bugId, tabKey) {
    closeNotifDropdown();
    var mainTab, cufSub;
    // CUF nested tabs route through CUF_ESCALATIONS parent
    if (tabKey === 'CUF_P0_P1' || tabKey === 'CUF_GUP' || tabKey === 'CUF_BILLING') {
      mainTab = 'CUF_ESCALATIONS';
      cufSub  = tabKey;
    } else {
      mainTab = tabKey;
      cufSub  = null;
    }
    // Ensure the correct header tab is active first
    var targetHeader = TAB_UTILS.getHeaderTab(mainTab);
    if (targetHeader && targetHeader !== activeHeaderTabId) {
      switchHeaderTab(targetHeader);
    }
    switchTab(mainTab);
    if (cufSub) switchCufSub(cufSub);
    // After render, find & select the row
    setTimeout(function () {
      // find the row on any page
      var rows = getActiveRows();
      var found = rows.filter(function (r) { return r.bug_id === bugId; })[0];
      if (found) {
        // bring to page 1, scroll to row
        currentPage = 1;
        renderIncidentTable();
        setTimeout(function () {
          var tbody = $('liveEscTbody');
          if (!tbody) return;
          var row = tbody.querySelector('tr[data-id="' + bugId + '"]');
          if (row) { row.scrollIntoView({ behavior:'smooth', block:'center' }); selectRow(bugId); }
          else { selectRow(bugId); }
        }, 50);
      }
    }, 100);
  }

  /* ── Inline comms blast ──────────────────────────────────────── */
  function renderInlineComms(bugId) {
    var panel = $('commsPanel');
    if (!panel) return;
    var row = _allRows.filter(function (r) { return r.bug_id === bugId; })[0];
    if (!row) return;

    panel.innerHTML =
      '<div class="comms-panel">' +
        '<div class="comms-panel-header"><div class="comms-dot"></div>' +
          '<span class="section-label">Latest Comms Blast — ' + esc(row.bug_id) + ' / ' + esc(row.iem_escalation_number) + '</span>' +
        '</div>' +
        '<div class="comms-panel-body"><div class="state-panel compact"><div class="spinner"></div><p>Loading…</p></div></div>' +
      '</div>';

    useDashboardData.fetchCommsLog(bugId, function (logs) {
      renderInlineLog(panel, row, logs || []);
    });
  }

  function renderInlineLog(panel, row, logs) {
    var latest   = logs.length ? logs[logs.length - 1] : null;
    var histRows = logs.slice().reverse().map(function (l, i) {
      return '<tr>' +
        '<td class="ts">' + esc(formatTs(l.timestamp)) + '</td>' +
        '<td>' + (i === logs.length - 1 ? 'Initial Update' : 'Update #' + (logs.length - 1 - i)) + '</td>' +
        '<td>' + esc(l.author) + '</td>' +
      '</tr>';
    }).join('');
    // Prefer last comms-log message; fall back to row's last_update field
    var msgText = latest ? latest.message
                : (row.last_update && row.last_update.trim()) ? row.last_update.trim()
                : 'No communications logged yet.';
    var safeMsgAttr = msgText.replace(/"/g,'&quot;');

    panel.innerHTML =
      '<div class="comms-panel">' +
        '<div class="comms-panel-header"><div class="comms-dot"></div>' +
          '<span class="section-label">Latest Comms Blast — ' + esc(row.bug_id) + ' / ' + esc(row.iem_escalation_number) + '</span>' +
        '</div>' +
        '<div class="comms-panel-body">' +
          '<div class="comms-message-box"><p class="comms-message-text">' + esc(msgText) + '</p></div>' +
          '<div class="comms-meta">' +
            '<span>' + (latest ? 'Sent ' + timeAgo(latest.timestamp) : '—') + '</span>' +
            '<span>BY: ' + esc(latest ? latest.author : '—') + '</span>' +
            '<button class="btn-log" onclick="copyCommsText(this)" data-text="' + safeMsgAttr + '">Copy Text</button>' +
          '</div>' +
          (histRows
            ? '<div class="comms-history-title">History of Comms</div>' +
              '<table class="comms-history-table"><thead><tr><th>Timestamp</th><th>Type</th><th>IEM POC</th></tr></thead>' +
              '<tbody>' + histRows + '</tbody></table>'
            : '') +
        '</div>' +
      '</div>';
  }

  window.copyCommsText = function (btn) {
    var text = btn.dataset.text || '';
    if (navigator.clipboard) navigator.clipboard.writeText(text);
    showToast('Copied to clipboard.');
  };

  /* ── Pagination ──────────────────────────────────────────────── */
  function initPagination() {
    var prevBtn = $('prevPageBtn');
    var nextBtn = $('nextPageBtn');
    if (prevBtn) prevBtn.addEventListener('click', function () {
      if (currentPage > 1) { currentPage--; renderIncidentTable(); }
    });
    if (nextBtn) nextBtn.addEventListener('click', function () {
      currentPage++;
      renderIncidentTable();
    });
  }

  function updatePaginationBar(page, totalPages, total, start, pageCount) {
    var bar     = $('paginationBar');
    var info    = $('pageInfo');
    var prevBtn = $('prevPageBtn');
    var nextBtn = $('nextPageBtn');
    if (!bar) return;
    if (total === 0) { bar.style.display = 'none'; return; }
    bar.style.display = '';
    if (info) {
      var end = start + pageCount;
      info.textContent = 'Page ' + page + ' of ' + totalPages + ' — ' + (start + 1) + '–' + end + ' of ' + total;
    }
    if (prevBtn) prevBtn.disabled = (page <= 1);
    if (nextBtn) nextBtn.disabled = (page >= totalPages);
  }

  /* ══════════════════════════════════════════════════════════════════
     TAB NAVIGATION
  ══════════════════════════════════════════════════════════════════ */
  function initTabs() {
    // Header tabs
    document.querySelectorAll('.headertab').forEach(function (btn) {
      btn.addEventListener('click', function () { switchHeaderTab(btn.dataset.header); });
    });
    // Nested (CUF) tabs
    document.querySelectorAll('.nestedtab').forEach(function (btn) {
      btn.addEventListener('click', function () { switchCufSub(btn.dataset.nested); });
    });
    // Render initial sub-tab cards
    renderSubTabCards();
  }

  function switchHeaderTab(headerId) {
    activeHeaderTabId = headerId;

    // Update header tab active state
    document.querySelectorAll('.headertab').forEach(function (b) {
      var on = b.dataset.header === headerId;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });

    // Select first sub-tab of this header
    var hcfg = TABS_CONFIG[headerId];
    if (hcfg && hcfg.children && hcfg.children.length) {
      var firstChild = hcfg.children[0];
      activeTabId = firstChild.id;
      // If first child itself has children (e.g. CUF), select first nested
      if (firstChild.children && firstChild.children.length) {
        activeCufSub = firstChild.children[0].id;
      }
    }

    renderSubTabCards();
    switchTab(activeTabId);
  }

  function switchTab(tabId) {
    activeTabId   = tabId;
    selectedRowId = null;
    currentPage   = 1;
    colFilters    = {};
    sortState     = { col: _DEFAULT_SORT.col, dir: _DEFAULT_SORT.dir };

    // Sync activeHeaderTabId from config
    var newHeader = TAB_UTILS.getHeaderTab(tabId);
    if (newHeader && newHeader !== tabId) activeHeaderTabId = newHeader;

    // Update sub-tab card active states (re-render)
    renderSubTabCards();

    // Show/hide CUF nested tab bar
    var nestedBar = $('nestedTabBar');
    if (nestedBar) nestedBar.style.display = (tabId === 'CUF_ESCALATIONS') ? '' : 'none';

    closeCommsPanel();
    closeFilterPopup();
    renderActiveTab();
  }

  function switchCufSub(subId) {
    activeCufSub  = subId;
    selectedRowId = null;
    currentPage   = 1;
    colFilters    = {};
    sortState     = { col: _DEFAULT_SORT.col, dir: _DEFAULT_SORT.dir };

    document.querySelectorAll('.nestedtab').forEach(function (b) {
      var on = b.dataset.nested === subId;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });

    closeCommsPanel();
    closeFilterPopup();
    renderActiveTab();
  }

  /* ── Render active tab view ──────────────────────────────────── */
  function renderActiveTab() {
    var filterKey = getFilterKey();
    var tab = TABS.filter(function (t) { return t.id === activeTabId; })[0] || TABS[0];

    var labelEl = $('activeTabLabel');
    var ctx = TAB_UTILS.resolveTabContext(getFilterKey());
    if (labelEl) labelEl.textContent = ctx ? ctx.node.label.toUpperCase() : (tab ? tab.label : '');

    var activeRows  = getActiveRows();
    var activeCount = countActiveRows(activeRows);

    var countEl = $('activeTabCount');  if (countEl) countEl.textContent = activeCount + ' active';
    var badgeEl = $('activeBadge');     if (badgeEl) badgeEl.textContent = activeCount + ' ACTIVE';

    initColumnHeaders();
    updateSortIcons();
    renderIncidentTable();

    clearInterval(ageIntervalId);

    if (analyticsInited) applyAnalyticsFilter(activePeriod);
  }

  /* ══════════════════════════════════════════════════════════════════
     ANALYTICS
  ══════════════════════════════════════════════════════════════════ */
  function initAnalytics() {
    if (analyticsInited) return;
    analyticsInited = true;
    document.querySelectorAll('.timeline-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        activePeriod = btn.dataset.period;
        document.querySelectorAll('.timeline-btn').forEach(function (b) {
          b.classList.toggle('active', b.dataset.period === activePeriod);
        });
        applyAnalyticsFilter(activePeriod);
      });
    });
    applyAnalyticsFilter(activePeriod);
  }

  function applyAnalyticsFilter(period) {
    if (!_allRows.length) return;
    var filterKey = getFilterKey();

    // Chart A — Line: New vs Resolved
    var storedMonthly = window._dashData && window._dashData.monthly && window._dashData.monthly[filterKey];
    var monthly = (storedMonthly && storedMonthly.length)
      ? storedMonthly
      : _deriveMonthlyFromRows(filterKey);
    renderBarChart(getFilteredMonthly(monthly, period));
  }

  /** Derives [{month:'YYYY-MM', count:N, resolved:N}] from _allRows for the given filter key. */
  function _deriveMonthlyFromRows(filterKey) {
    var filter   = TAB_FILTERS[filterKey] || function () { return true; };
    var newCts   = {};
    var resCts   = {};
    _allRows.forEach(function (r) {
      if (!filter(r)) return;
      // New (created)
      if (r.created_timestamp) {
        var d = new Date(r.created_timestamp);
        if (!isNaN(d.getTime())) {
          var ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          newCts[ym] = (newCts[ym] || 0) + 1;
        }
      }
      // Resolved (closed)
      if (r.closed_timestamp && String(r.closed_timestamp).trim()) {
        var d2 = new Date(r.closed_timestamp);
        if (!isNaN(d2.getTime())) {
          var ym2 = d2.getFullYear() + '-' + String(d2.getMonth() + 1).padStart(2, '0');
          resCts[ym2] = (resCts[ym2] || 0) + 1;
        }
      }
    });
    var allMonths = {};
    Object.keys(newCts).forEach(function (m) { allMonths[m] = true; });
    Object.keys(resCts).forEach(function (m) { allMonths[m] = true; });
    return Object.keys(allMonths).sort().map(function (ym) {
      return { month: ym, count: newCts[ym] || 0, resolved: resCts[ym] || 0 };
    });
  }

  var PERIOD_MONTHS = { '1W':0.25,'1M':1,'3M':3,'6M':6,'Q':3,'Y':12 };
  var PERIOD_LABEL  = { '1W':'1 Week','1M':'1 Month','3M':'3 Months','6M':'6 Months','Q':'Quarterly','Y':'Yearly' };

  function getFilteredMonthly(monthly, period) {
    var n = PERIOD_MONTHS[period] || 3;
    var cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - Math.ceil(n));
    return monthly.filter(function (m) { return new Date(m.month + '-01') >= cutoff; });
  }

  function getFilteredRaw(raw, period) {
    var n = PERIOD_MONTHS[period] || 3;
    var cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - Math.ceil(n));
    return raw.filter(function (r) { return new Date(r.month + '-01') >= cutoff; });
  }

  function monthLabel(ym) {
    try {
      return new Date(ym + '-01').toLocaleDateString('en-US', { month:'short', year:'2-digit' });
    } catch (e) { return ym; }
  }

  /* ── Chart A: Line — New vs Resolved ────────────────────────── */
  function renderBarChart(monthly) {
    var isDark  = document.body.classList.contains('theme-dark');
    var gridClr = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    var textClr = isDark ? '#71717a' : '#64748b';

    var labels  = monthly.map(function (m) { return monthLabel(m.month); });
    var newCts  = monthly.map(function (m) { return m.count    || 0; });
    var resCts  = monthly.map(function (m) { return m.resolved || 0; });

    // % gap badge
    var totalNew = newCts.reduce(function (s, v) { return s + v; }, 0);
    var totalRes = resCts.reduce(function (s, v) { return s + v; }, 0);
    var gapEl = $('gapBadge');
    if (gapEl) {
      if (totalNew > 0) {
        var gapPct = Math.round((totalNew - totalRes) / totalNew * 100);
        gapEl.textContent = (gapPct > 0 ? '+' : '') + gapPct + '% unresolved';
        gapEl.className   = 'chart-gap-badge ' + (gapPct > 20 ? 'gap-badge-bad' : gapPct > 5 ? 'gap-badge-warn' : 'gap-badge-good');
        gapEl.style.display = '';
      } else {
        gapEl.style.display = 'none';
      }
    }

    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    var ctx = $('mainChart');
    if (!ctx) return;
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'New',
            data: newCts,
            borderColor: isDark ? '#60a5fa' : '#2563eb',
            backgroundColor: isDark ? 'rgba(96,165,250,0.10)' : 'rgba(37,99,235,0.07)',
            tension: 0.35,
            pointRadius: 3,
            pointHoverRadius: 5,
            fill: true
          },
          {
            label: 'Resolved',
            data: resCts,
            borderColor: isDark ? '#34d399' : '#059669',
            backgroundColor: 'transparent',
            tension: 0.35,
            pointRadius: 3,
            pointHoverRadius: 5,
            borderDash: [4, 3]
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function (c) { return ' ' + c.dataset.label + ': ' + c.raw; }
            }
          }
        },
        scales: {
          x: { grid: { color: gridClr }, ticks: { color: textClr, font: { size: 10 } } },
          y: { beginAtZero: true, grid: { color: gridClr }, ticks: { color: textClr, font: { size: 10 }, precision: 0 } }
        }
      }
    });
  }

  /* ══════════════════════════════════════════════════════════════════
     LOGO + USER AVATAR
  ══════════════════════════════════════════════════════════════════ */
  function initLogo() {
    var logoEl   = $('teamLogo');
    var fallback = $('teamLogoFallback');
    if (!logoEl) return;

    function showLogo()     { logoEl.style.display = '';    if (fallback) fallback.style.display = 'none'; }
    function showFallback() { logoEl.style.display = 'none'; if (fallback) fallback.style.display = ''; }

    var gasUrl = (typeof GAS_LOGO_URL !== 'undefined') ? GAS_LOGO_URL : '';
    if (gasUrl && gasUrl.indexOf('<?') === -1 && gasUrl.length > 4) {
      logoEl.src = gasUrl;
      logoEl.onload = showLogo;
      logoEl.onerror = showFallback;
    } else if (typeof google === 'undefined' || !google.script) {
      logoEl.src = '../Screenshot 2026-02-03 at 4.13.25 AM.png';
      logoEl.onload = showLogo;
      logoEl.onerror = showFallback;
    } else {
      showFallback();
    }
  }

  /* ══════════════════════════════════════════════════════════════════
     NOTIFICATIONS
  ══════════════════════════════════════════════════════════════════ */
  function initNotifications() {
    var btn      = $('notifBtn');
    var dropdown = $('notifDropdown');
    var wrap     = $('notifWrap');
    if (!btn || !dropdown) return;

    // Subscribe to hook updates
    useNotifications.subscribe(function (items) {
      renderNotifBadge(items);
      renderNotifList(items);
    });

    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var isOpen = dropdown.style.display !== 'none';
      if (isOpen) {
        closeNotifDropdown();
      } else {
        dropdown.style.display = '';
        btn.setAttribute('aria-expanded', 'true');
        useClickOutside([wrap], closeNotifDropdown);
      }
    });

    var markAllBtn = $('markAllReadBtn');
    if (markAllBtn) {
      markAllBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        useNotifications.markAllRead();
      });
    }

    useNotifications.init();
  }

  function closeNotifDropdown() {
    var dropdown = $('notifDropdown');
    var btn      = $('notifBtn');
    if (dropdown) dropdown.style.display = 'none';
    if (btn)      btn.setAttribute('aria-expanded', 'false');
  }

  function renderNotifBadge(items) {
    var unread = items.filter(function (n) { return !n.read; }).length;
    var badge  = $('notifBadge');
    if (!badge) return;
    badge.textContent   = unread;
    badge.style.display = unread > 0 ? '' : 'none';
    var btn = $('notifBtn');
    if (btn) btn.setAttribute('aria-label', 'Notifications' + (unread > 0 ? ' — ' + unread + ' unread' : ''));
  }

  function renderNotifList(items) {
    var list = $('notifList');
    if (!list) return;
    if (!items.length) {
      list.innerHTML = '<div class="notif-empty">No notifications</div>';
      return;
    }
    list.innerHTML = items.map(function (n) {
      return '<div class="notif-item' + (n.read ? '' : ' notif-unread') + '" ' +
        'data-notif-id="' + esc(n.id) + '" ' +
        'data-incident-id="' + esc(n.incidentId) + '" ' +
        'data-tab-key="' + esc(n.tabKey) + '" ' +
        'tabindex="0" role="menuitem">' +
          '<div class="notif-item-meta">' +
            '<span class="notif-bug-id">' + esc(n.bugId) + '</span>' +
            '<span class="notif-ts">' + timeAgo(n.ts) + '</span>' +
          '</div>' +
          '<div class="notif-item-title">' + esc(n.title) + '</div>' +
          '<div class="notif-item-body">' + esc(n.body) + '</div>' +
        '</div>';
    }).join('');

    list.querySelectorAll('.notif-item').forEach(function (item) {
      function openItem() {
        var id        = item.dataset.notifId;
        var bugId     = item.dataset.incidentId;
        var tabKey    = item.dataset.tabKey;
        useNotifications.markRead(id);
        closeNotifDropdown();
        navigateToIncident(bugId, tabKey);
      }
      item.addEventListener('click', openItem);
      item.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openItem(); } });
    });
  }

  /* ══════════════════════════════════════════════════════════════════
     MODAL
  ══════════════════════════════════════════════════════════════════ */
  function initModal() {
    var closeBtn = $('modalCloseBtn');
    var backdrop = $('logModalBackdrop');
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (backdrop) backdrop.addEventListener('click', function (e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });
  }

  function closeModal() {
    var bd = $('logModalBackdrop');
    if (!bd) return;
    bd.style.display = 'none';
    bd.setAttribute('aria-hidden', 'true');
  }

  /* ══════════════════════════════════════════════════════════════════
     THEME + CLOCK
  ══════════════════════════════════════════════════════════════════ */
  function initTheme() {
    var saved = localStorage.getItem('iem-theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    applyTheme(theme);
    var btn = $('themeToggleBtn');
    if (btn) btn.addEventListener('click', function () {
      applyTheme(document.body.classList.contains('theme-light') ? 'dark' : 'light');
    });
  }

  function applyTheme(theme) {
    document.body.classList.remove('theme-dark', 'theme-light');
    document.body.classList.add('theme-' + theme);
    document.body.setAttribute('data-theme', theme);
    var iconDark  = $('themeIconDark');
    var iconLight = $('themeIconLight');
    if (iconDark)  iconDark.style.display  = theme === 'dark'  ? '' : 'none';
    if (iconLight) iconLight.style.display = theme === 'light' ? '' : 'none';
    localStorage.setItem('iem-theme', theme);
    if (analyticsInited) {
      applyAnalyticsFilter(activePeriod);
    }
  }

  function initClock() {
    function tick() {
      var el = $('clock');
      if (el) el.textContent = new Date().toLocaleTimeString('en-US', { hour12:false, timeZone:'America/Los_Angeles' });
    }
    tick();
    setInterval(tick, 1000);
  }

  /* ══════════════════════════════════════════════════════════════════
     STATE PANELS + FOOTER
  ══════════════════════════════════════════════════════════════════ */
  function showLoading() {
    if ($('loadingState'))    $('loadingState').style.display    = '';
    if ($('errorState'))      $('errorState').style.display      = 'none';
    if ($('dashboardContent'))$('dashboardContent').style.display = 'none';
  }

  function showDashboard() {
    if ($('loadingState'))    $('loadingState').style.display    = 'none';
    if ($('errorState'))      $('errorState').style.display      = 'none';
    if ($('dashboardContent'))$('dashboardContent').style.display = '';
  }

  function showError(msg) {
    if ($('loadingState'))    $('loadingState').style.display    = 'none';
    if ($('dashboardContent'))$('dashboardContent').style.display = 'none';
    if ($('errorState'))      $('errorState').style.display      = '';
    if ($('errorMsg'))        $('errorMsg').textContent           = msg || 'Failed to load data.';
  }


  /* ══════════════════════════════════════════════════════════════════
     SHEET URL FETCH BAR
  ══════════════════════════════════════════════════════════════════ */

  function initSheetFetch() {
    var btn   = $('sheetFetchBtn');
    var input = $('sheetUrlInput');
    if (!btn || !input) return;
    btn.addEventListener('click', _doSheetFetch);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') _doSheetFetch();
    });
  }

  function _sfbStatus(msg, ok) {
    var el = $('sfbStatus');
    if (!el) return;
    el.textContent  = msg;
    el.className    = 'sfb-status' + (ok === true ? ' sfb-ok' : ok === false ? ' sfb-err' : '');
  }

  /** Regex-extracts { sheetId, gid } from any Google Sheets URL. */
  function _parseSheetUrlClient(url) {
    var idM = url.match(/\/spreadsheets\/d\/([A-Za-z0-9_-]{20,})/);
    if (!idM) return null;
    var gidM = url.match(/[?&#]gid=(\d+)/);
    return { sheetId: idM[1], gid: gidM ? gidM[1] : '' };
  }

  function _doSheetFetch() {
    var input = $('sheetUrlInput');
    var btn   = $('sheetFetchBtn');
    var raw   = (input && input.value.trim()) || '';
    if (!raw) { _sfbStatus('Paste a Google Sheet URL first.', false); return; }

    var parsed = _parseSheetUrlClient(raw);
    if (!parsed) { _sfbStatus('Could not extract Sheet ID from URL.', false); return; }

    btn.disabled    = true;
    btn.textContent = 'Fetching…';
    _sfbStatus('');

    if (typeof google !== 'undefined' && google.script) {
      // GAS context — server-side fetch bypasses CORS
      google.script.run
        .withSuccessHandler(function (res) {
          btn.disabled    = false;
          btn.textContent = 'Fetch';
          if (!res.ok) { _sfbStatus(res.error || 'Fetch failed.', false); return; }
          _applyFetchedRows(res.rows, res._meta);
        })
        .withFailureHandler(function (e) {
          btn.disabled    = false;
          btn.textContent = 'Fetch';
          _sfbStatus((e && e.message) ? e.message : 'Fetch failed.', false);
        })
        .fetchSheetByUrl(parsed.sheetId, parsed.gid);
    } else {
      // Non-GAS context — direct CSV export (works when sheet is publicly shared)
      var csvUrl = 'https://docs.google.com/spreadsheets/d/' + parsed.sheetId +
                   '/export?format=csv' + (parsed.gid ? '&gid=' + parsed.gid : '');
      fetch(csvUrl)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function (csvText) {
          btn.disabled    = false;
          btn.textContent = 'Fetch';
          var rows = _csvToCanonical(csvText);
          _applyFetchedRows(rows, { strategy: 'csv-direct' });
        })
        .catch(function (err) {
          btn.disabled    = false;
          btn.textContent = 'Fetch';
          _sfbStatus((err && err.message) ? err.message : 'Fetch failed. Ensure the sheet is publicly shared.', false);
        });
    }
  }

  /** Loads fetched rows into the live table without touching mock data. */
  function _applyFetchedRows(rows, meta) {
    if (!Array.isArray(rows) || rows.length === 0) {
      _sfbStatus('No rows returned.', false);
      return;
    }
    // Normalise bug_id: ensure "b/" prefix
    rows = rows.map(function (r) {
      var id = String(r.bug_id || '').trim();
      if (id && !/^b\//i.test(id)) id = 'b/' + id;
      return id !== r.bug_id ? Object.assign({}, r, { bug_id: id }) : r;
    });
    _allRows = rows;
    if (window._dashData) {
      window._dashData.rows    = rows;
      window._dashData.monthly = {};   // clear stale pre-aggregated data; will derive from rows
      window._dashData.raw     = {};
    }
    showDashboard();
    renderActiveTab();
    if (analyticsInited) applyAnalyticsFilter(activePeriod);
    _sfbStatus(rows.length + ' rows loaded' + (meta && meta.sheetName ? ' from "' + meta.sheetName + '"' : '') + '.', true);
  }

  /* ── Client-side CSV parser + canonical mapper (non-GAS fallback) ── */

  var _CLIENT_ALIASES = {
    bug_id:                    ['bug_id','bug id','id','bugid','issue id','case id'],
    iem_escalation_number:     ['iem_escalation_number','iem escalation number','escalation #','escalation number','iem escalation #','vector case','iem bug/vector case'],
    current_assignee_ldap:     ['current_assignee_ldap','current assignee ldap','assignee','requesting poc','assigned to','owner'],
    product_name:              ['product_name','product name','product area','product','service'],
    priority:                  ['priority','severity','p0/p1','sev'],
    customer_name:             ['customer_name','customer name','customer','account','company'],
    subject:                   ['subject','title','issue','summary','description'],
    last_update:               ['last_update','last update','update','latest update','notes'],
    p0_time_to_first_update_mins: ['p0_time_to_first_update_mins','p0 time to first update (mins)','p0 fmr (mins)','p0 fmr'],
    time_to_first_update_mins: ['time_to_first_update_mins','time to first update (mins)','fmr (mins)','fmr','first response mins','tfu'],
    resolution_hours:          ['resolution_hours','resolution hours','age (hours)','resolution time','hours to close'],
    created_timestamp:         ['created_timestamp','created at','created','opened at','date opened','date created'],
    closed_timestamp:          ['closed_timestamp','closed at','closed','resolved at','date closed'],
    status:                    ['status','state','current status'],
    iem_escalation_type:       ['iem_escalation_type','iem escalation type','escalation type','type','category'],
    impact:                    ['impact','revenue at risk','revenue_at_risk','rev at risk','arr impact','arr','financial impact']
  };

  var _CLIENT_ALIAS_LOOKUP = (function () {
    var m = {};
    Object.keys(_CLIENT_ALIASES).forEach(function (canon) {
      _CLIENT_ALIASES[canon].forEach(function (alias) { m[alias.toLowerCase()] = canon; });
    });
    return m;
  }());

  function _csvToCanonical(text) {
    var lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    var headers = _splitCsvRow(lines[0]);
    var headerMap = {};   // colIndex → canonicalKey
    headers.forEach(function (h, i) {
      var canon = _CLIENT_ALIAS_LOOKUP[h.toLowerCase().trim()];
      if (canon) headerMap[i] = canon;
    });
    return lines.slice(1).map(function (line, idx) {
      var vals = _splitCsvRow(line);
      var row  = {};
      Object.keys(headerMap).forEach(function (i) { row[headerMap[i]] = (vals[i] || '').trim(); });
      if (!row.bug_id) row.bug_id = 'ext-' + idx;
      return row;
    });
  }

  function _splitCsvRow(row) {
    var result = [], cur = '', inQ = false;
    for (var i = 0; i < row.length; i++) {
      var c = row[i];
      if (c === '"') {
        if (inQ && row[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += c; }
    }
    result.push(cur);
    return result;
  }

  /* ══════════════════════════════════════════════════════════════════
     SETTINGS PANEL
  ══════════════════════════════════════════════════════════════════ */

  var _settingsState = {
    dataSource: 'publicSheet',
    sheetUrl:   '',
    sheetId:    '',
    sheetGid:   ''
  };

  var _sheetMappings = {
    INCIDENT_MANAGEMENT:   [],
    ESCALATION_MANAGEMENT: [],
    SERVICE_DISRUPTION:    []
  };
  var _activeDataSource = 'publicSheet';

  function _renderSheetRow(groupId, mapping, rowIndex) {
    var prefix = 'sm_' + groupId + '_' + rowIndex;
    // Resolve Sheet ID: prefer stored sheetId, else extract from url
    var sheetIdVal = mapping.sheetId || _parseSheetUrl(mapping.url || '') || '';
    return '<div class="sheet-mapping-row" data-group="' + groupId + '" data-idx="' + rowIndex + '">' +
      '<div class="smr-fields">' +
        '<input class="settings-input smr-name" id="' + prefix + '_name" type="text"' +
          ' placeholder="Display name (optional)" value="' + esc(mapping.name||'') + '"' +
          ' style="max-width:130px">' +
        '<div class="smr-url-col">' +
          '<input class="settings-input smr-url" id="' + prefix + '_url" type="text"' +
            ' placeholder="Paste full Google Sheets URL" value="' + esc(mapping.url||'') + '">' +
          '<span class="smr-hint">Sheet ID is auto-extracted from the URL when you paste it.</span>' +
          '<div class="smr-field-row">' +
            '<div style="flex:1;min-width:100px">' +
              '<input class="settings-input smr-sheetid" id="' + prefix + '_sheetid" type="text"' +
                ' placeholder="Auto-filled from URL, or enter manually" value="' + esc(sheetIdVal) + '">' +
              '<span class="smr-hint">Sheet ID — auto-filled above, or type to override.</span>' +
            '</div>' +
            '<div style="max-width:110px">' +
              '<input class="settings-input smr-gid" id="' + prefix + '_gid" type="text"' +
                ' placeholder="Tab GID (optional)" value="' + esc(mapping.gid||'') + '">' +
              '<span class="smr-hint">Found in URL as gid=…</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="smr-actions">' +
        '<label class="smr-toggle"><input type="checkbox" class="smr-enabled"' + (mapping.enabled !== false ? ' checked' : '') + '> Active</label>' +
        '<button class="smr-remove btn-secondary" type="button" data-group="' + groupId + '" data-idx="' + rowIndex + '">✕</button>' +
      '</div>' +
    '</div>';
  }

  function _initSheetMappingsUI() {
    // Wire "Add Sheet" buttons
    document.querySelectorAll('.sheet-group-add-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var groupId = btn.dataset.group;
        if (!_sheetMappings[groupId]) _sheetMappings[groupId] = [];
        _sheetMappings[groupId].push({ name:'', url:'', gid:'', enabled:true });
        _renderSheetRowsForGroup(groupId);
      });
    });
  }

  function _renderSheetRowsForGroup(groupId) {
    var container = $('sheetRows_' + groupId);
    if (!container) return;
    var mappings = _sheetMappings[groupId] || [];
    container.innerHTML = mappings.map(function (m, i) {
      return _renderSheetRow(groupId, m, i);
    }).join('');

    // Wire remove buttons
    container.querySelectorAll('.smr-remove').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var idx = parseInt(btn.dataset.idx, 10);
        _sheetMappings[groupId].splice(idx, 1);
        _renderSheetRowsForGroup(groupId);
      });
    });

    // Wire URL → SheetID auto-sync
    container.querySelectorAll('.smr-url').forEach(function (urlInput) {
      var row = urlInput.closest('.sheet-mapping-row');
      if (!row) return;
      var prefix = 'sm_' + groupId + '_' + row.dataset.idx;
      var sheetIdInput = document.getElementById(prefix + '_sheetid');
      if (!sheetIdInput) return;
      urlInput.addEventListener('input', function () {
        var extracted = _parseSheetUrl(urlInput.value.trim());
        // Only auto-populate if user has not manually edited the sheetid field
        if (!sheetIdInput.dataset.manualEdit) {
          sheetIdInput.value = extracted || '';
        }
        // If URL is cleared, clear auto-fill unless manually set
        if (!urlInput.value.trim() && !sheetIdInput.dataset.manualEdit) {
          sheetIdInput.value = '';
        }
      });
      sheetIdInput.addEventListener('input', function () {
        // Flag that user has manually edited this field
        sheetIdInput.dataset.manualEdit = sheetIdInput.value ? '1' : '';
      });
    });
  }

  function _readSheetMappingsFromUI() {
    ['INCIDENT_MANAGEMENT','ESCALATION_MANAGEMENT','SERVICE_DISRUPTION'].forEach(function (groupId) {
      var container = $('sheetRows_' + groupId);
      if (!container) return;
      var rows = container.querySelectorAll('.sheet-mapping-row');
      _sheetMappings[groupId] = [];
      rows.forEach(function (row) {
        var idx = parseInt(row.dataset.idx, 10);
        var prefix = 'sm_' + groupId + '_' + idx;
        var nameEl      = $(prefix + '_name');
        var urlEl       = $(prefix + '_url');
        var sheetIdEl   = $(prefix + '_sheetid');
        var gidEl       = $(prefix + '_gid');
        var enabledEl   = row.querySelector('.smr-enabled');
        var urlVal      = urlEl      ? urlEl.value.trim()      : '';
        var sheetIdVal  = sheetIdEl  ? sheetIdEl.value.trim()  : '';
        // Fallback: extract from URL if sheetid field is empty
        if (!sheetIdVal) sheetIdVal = _parseSheetUrl(urlVal);
        _sheetMappings[groupId].push({
          name:    nameEl    ? nameEl.value.trim() : '',
          url:     urlVal,
          sheetId: sheetIdVal,
          gid:     gidEl     ? gidEl.value.trim()  : '',
          enabled: enabledEl ? enabledEl.checked   : true
        });
      });
    });
  }

  function initSettings() {
    var settingsBtn  = $('settingsBtn');
    var backdrop     = $('settingsBackdrop');
    var closeBtn     = $('settingsCloseBtn');
    var cancelBtn    = $('settingsCancelBtn');
    var saveBtn      = $('settingsSaveBtn');
    var testBtn      = $('testConnBtn');
    var sourceBtns   = document.querySelectorAll('.source-btn');

    if (!settingsBtn || !backdrop) return;

    // Open
    settingsBtn.addEventListener('click', openSettings);

    // Close / cancel
    function closeSettings() {
      backdrop.style.display = 'none';
      backdrop.setAttribute('aria-hidden', 'true');
    }
    closeBtn.addEventListener('click', closeSettings);
    cancelBtn.addEventListener('click', closeSettings);
    backdrop.addEventListener('click', function (e) {
      if (e.target === backdrop) closeSettings();
    });

    // Source toggle
    sourceBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        sourceBtns.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        _settingsState.dataSource = btn.dataset.source;
        _activeDataSource = btn.dataset.source;
        _updateSourceSections();
      });
    });

    // Test connection
    testBtn.addEventListener('click', handleTestConnection);

    // Save
    saveBtn.addEventListener('click', handleSaveConfig);

    _initSheetMappingsUI();
    _updateSourceSections();
  }

  function openSettings() {
    var backdrop = $('settingsBackdrop');
    if (!backdrop) return;
    backdrop.style.display = '';
    backdrop.setAttribute('aria-hidden', 'false');
    _settingsStatusHide();

    // Load current config from GAS
    if (typeof google !== 'undefined' && google.script) {
      google.script.run
        .withSuccessHandler(function (cfg) { _applyConfig(cfg); })
        .withFailureHandler(function ()    { /* use defaults */ })
        .getSheetConfig();
      // Also load all sheet mappings
      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.ok && res.mappings) {
            _sheetMappings = res.mappings;
            ['INCIDENT_MANAGEMENT','ESCALATION_MANAGEMENT','SERVICE_DISRUPTION'].forEach(_renderSheetRowsForGroup);
          }
        })
        .withFailureHandler(function () { /* ignore */ })
        .getAllSheetMappings();
    }
  }

  function _applyConfig(cfg) {
    if (!cfg) return;
    _settingsState.dataSource = cfg.dataSource || 'publicSheet';
    _activeDataSource = _settingsState.dataSource;
    _settingsState.sheetUrl   = cfg.sheetUrl   || '';
    _settingsState.sheetId    = cfg.sheetId    || '';
    _settingsState.sheetGid   = cfg.sheetGid   || '';

    var apiUrl = $('settingsApiUrl');
    if (apiUrl && cfg.apiUrl) apiUrl.value = cfg.apiUrl;

    // Update source toggle
    var sourceBtns = document.querySelectorAll('.source-btn');
    sourceBtns.forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.source === _settingsState.dataSource);
    });
    _updateSourceSections();
  }

  function _updateSourceSections() {
    var sheetMappingsSection = $('sheetMappingsSection');
    var apiSection    = $('apiSection');
    var hintEl        = $('sourceHint');
    var src           = _settingsState.dataSource;

    if (sheetMappingsSection) sheetMappingsSection.style.display = (src === 'publicSheet') ? '' : 'none';
    if (apiSection)    apiSection.style.display     = (src === 'api')         ? '' : 'none';

    var hints = {
      mock:        'Dashboard will use built-in mock data. No external source needed.',
      publicSheet: 'Pull live data from Google Sheets mapped per section below.',
      api:         'Pull live data from a REST API endpoint.'
    };
    if (hintEl) hintEl.textContent = hints[src] || '';
  }

  /**
   * Extracts the spreadsheet ID from a Google Sheets URL, or returns the
   * raw string if it already looks like a bare ID.
   */
  function _parseSheetUrl(urlOrId) {
    if (!urlOrId) return '';
    var m = urlOrId.match(/\/spreadsheets\/d\/([A-Za-z0-9_-]{20,})/);
    if (m) return m[1];
    if (/^[A-Za-z0-9_-]{20,}$/.test(urlOrId)) return urlOrId;
    return '';
  }

  /* ── Test connection ──────────────────────────────────────────── */
  function handleTestConnection() {
    var testBtn = $('testConnBtn');
    if (_settingsState.dataSource === 'mock') {
      _settingsStatusShow(true, 'Mock mode — no external connection needed.');
      return;
    }

    // Read current UI state first
    _readSheetMappingsFromUI();

    // Find first enabled mapping across all groups for a quick test
    var testMapping = null;
    var groups = ['ESCALATION_MANAGEMENT','INCIDENT_MANAGEMENT','SERVICE_DISRUPTION'];
    for (var gi = 0; gi < groups.length && !testMapping; gi++) {
      var gMappings = _sheetMappings[groups[gi]] || [];
      for (var mi = 0; mi < gMappings.length; mi++) {
        if (gMappings[mi].enabled !== false && (gMappings[mi].url || gMappings[mi].sheetId)) {
          testMapping = gMappings[mi];
          break;
        }
      }
    }

    if (!testMapping && _settingsState.dataSource === 'publicSheet') {
      _settingsStatusShow(false, 'Add at least one sheet mapping first.');
      return;
    }

    testBtn.disabled    = true;
    testBtn.textContent = 'Testing…';

    var cfg = testMapping ? {
      sheetUrl: testMapping.url || '',
      sheetId:  testMapping.sheetId || _parseSheetUrl(testMapping.url || ''),
      sheetGid: testMapping.gid || ''
    } : { sheetUrl:'', sheetId:'', sheetGid:'' };

    if (typeof google !== 'undefined' && google.script) {
      google.script.run
        .withSuccessHandler(function (res) {
          testBtn.disabled = false;
          testBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Test Connection';
          if (res.success) {
            _settingsStatusShow(true,
              'Connected via ' + res.fetchMethod + ' — ' + res.rowCount + ' rows' +
              (res.tabName ? ' on tab "' + res.tabName + '"' : '') + '.');
          } else {
            _settingsStatusShow(false, res.error || 'Connection failed.');
          }
        })
        .withFailureHandler(function (e) {
          testBtn.disabled = false;
          testBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Test Connection';
          _settingsStatusShow(false, (e && e.message) ? e.message : 'Test failed.');
        })
        .testSheetConnection(cfg);
    } else {
      testBtn.disabled = false;
      testBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Test Connection';
      _settingsStatusShow(true, 'Local dev — mock connection OK. 24 rows.');
    }
  }

  /* ── Save & reload ────────────────────────────────────────────── */
  function handleSaveConfig() {
    var saveBtn = $('settingsSaveBtn');
    var apiUrl  = $('settingsApiUrl');

    // Read current sheet mappings from UI
    _readSheetMappingsFromUI();

    var cfg = {
      dataSource: _settingsState.dataSource,
      sheetUrl:   _settingsState.sheetUrl,
      sheetId:    _settingsState.sheetId || _parseSheetUrl(_settingsState.sheetUrl),
      sheetGid:   _settingsState.sheetGid,
      apiUrl:     apiUrl ? apiUrl.value.trim() : ''
    };

    saveBtn.disabled    = true;
    saveBtn.textContent = 'Saving…';

    if (typeof google !== 'undefined' && google.script) {
      // Save base config first, then sheet mappings for each group
      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.ok) {
            // Save per-group sheet mappings
            var groups = ['INCIDENT_MANAGEMENT','ESCALATION_MANAGEMENT','SERVICE_DISRUPTION'];
            var pending = groups.length;
            groups.forEach(function (groupId) {
              google.script.run
                .withSuccessHandler(function () {
                  pending--;
                  if (pending === 0) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg> Save &amp; Reload';
                    DATA_ENDPOINT.type = cfg.dataSource === 'publicSheet' ? 'gas'
                                       : cfg.dataSource === 'mock'        ? 'mock'
                                       : cfg.dataSource === 'api'         ? 'rest'
                                       : 'gas';
                    $('settingsBackdrop').style.display = 'none';
                    showToast('Settings saved. Reloading data…', 2000);
                    setTimeout(loadDashboard, 2200);
                  }
                })
                .withFailureHandler(function () { pending--; })
                .saveSheetMappings(groupId, _sheetMappings[groupId] || []);
            });
          } else {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg> Save &amp; Reload';
            _settingsStatusShow(false, (res && res.error) ? res.error : 'Save failed.');
          }
        })
        .withFailureHandler(function (e) {
          saveBtn.disabled = false;
          saveBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg> Save &amp; Reload';
          _settingsStatusShow(false, (e && e.message) ? e.message : 'Save failed.');
        })
        .saveSheetConfig(cfg);
    } else {
      // Local dev: just reload with mock
      saveBtn.disabled = false;
      saveBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg> Save &amp; Reload';
      $('settingsBackdrop').style.display = 'none';
      showToast('Settings saved (local dev — using mock data).', 2000);
      setTimeout(loadDashboard, 2200);
    }
  }

  /* ── Settings status helpers ──────────────────────────────────── */
  function _settingsStatusShow(ok, msg) {
    var el   = $('settingsStatus');
    var icon = $('settingsStatusIcon');
    var msgEl= $('settingsStatusMsg');
    if (!el) return;
    el.style.display = '';
    el.className = 'settings-status ' + (ok ? 'settings-status-ok' : 'settings-status-err');
    if (icon) icon.textContent = ok ? '✓' : '✗';
    if (msgEl) msgEl.textContent = msg || '';
  }
  function _settingsStatusHide() {
    var el = $('settingsStatus');
    if (el) el.style.display = 'none';
  }

  /* HTML-escape helper (already used by other parts, safe to redefine locally) */
  function _esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Toast ───────────────────────────────────────────────────── */
  function showToast(msg, ms) {
    var el = $('toast');
    if (!el) return;
    el.textContent   = msg;
    el.style.display = '';
    clearTimeout(el._tid);
    el._tid = setTimeout(function () { el.style.display = 'none'; }, ms || 2500);
  }

  /* ══════════════════════════════════════════════════════════════════
     BOOT
  ══════════════════════════════════════════════════════════════════ */
  function loadDashboard() {
    showLoading();
    useDashboardData.fetch();
  }
  window.loadDashboard = loadDashboard;

  document.addEventListener('DOMContentLoaded', function () {
    initTheme();
    initClock();
    initTabs();
    initPagination();
    initFilterPopup();
    initModal();
    initLogo();
    initNotifications();
    initSheetFetch();
    initSettings();

    // Subscribe to dashboard data
    useDashboardData.subscribe('change', function (data) {
      window._dashData = data;
      _allRows = (data.rows || []).map(function (r) {
        var id = String(r.bug_id || '').trim();
        if (id && !/^b\//i.test(id)) id = 'b/' + id;
        return id !== r.bug_id ? Object.assign({}, r, { bug_id: id }) : r;
      });
      showDashboard();
      renderActiveTab();
      initAnalytics();
    });
    useDashboardData.subscribe('error', function (err) {
      showError(err && err.message ? err.message : 'Failed to load dashboard data.');
    });

    // Subscribe to current user (avatar — show LDAP)
    useCurrentUser.subscribe(function (u) {
      var el = $('userAvatar');
      if (!el || !u) return;
      var ldap = u.ldap || (u.name ? u.name.toLowerCase().replace(/\s+/g, '') : u.initials);
      el.textContent = ldap;
      el.title       = 'Logged in as ' + (u.ldap || u.name);
      el.setAttribute('aria-label', 'User: ' + (u.ldap || u.name));
    });

    useCurrentUser.fetch();
    loadDashboard();
  });

}());
</script>
