  // ── Escalation age (live-computed, never hardcoded) ───────────────────
  function calcEscalationAge(createdTs, nowTs) {
    var start   = new Date(createdTs).getTime();
    var end     = nowTs || Date.now();
    var diff    = Math.max(0, end - start);
    var minutes = Math.floor(diff / 60000);
    if (minutes < 1)  return '< 1m';
    if (minutes < 60) return minutes + 'm';
    var hours = Math.floor(minutes / 60);
    var mins  = minutes % 60;
    if (hours < 24)   return hours + 'h' + (mins > 0 ? ' ' + mins + 'm' : '');
    var days  = Math.floor(hours / 24);
    var hrs   = hours % 24;
    return days + 'd' + (hrs > 0 ? ' ' + hrs + 'h' : '');
  }

    return 'fmr-bad';
  }

  // ── Theme ─────────────────────────────────────────────────────────────
  function initTheme() {
    var saved  = localStorage.getItem('iem-theme');
    var theme  = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    applyTheme(theme);
    $('themeToggleBtn').addEventListener('click', function () {
      applyTheme(document.body.classList.contains('theme-light') ? 'dark' : 'light');
    });
  }

  function applyTheme(theme) {
    document.body.classList.remove('theme-dark', 'theme-light');
    document.body.classList.add('theme-' + theme);
    document.body.setAttribute('data-theme', theme);
    $('themeIconDark').style.display  = theme === 'dark'  ? '' : 'none';
    $('themeIconLight').style.display = theme === 'light' ? '' : 'none';
    localStorage.setItem('iem-theme', theme);
    if (analyticsInited) applyAnalyticsFilter(activePeriod);
  }

  // ── Live clock (Pacific) ──────────────────────────────────────────────
  function initClock() {
    function tick() {
      var el = $('clock');
      if (el) el.textContent = new Date().toLocaleTimeString('en-US', { hour12: false, timeZone: 'America/Los_Angeles' });
    }
    tick();
    setInterval(tick, 1000);
  }

  // ── Tabs ──────────────────────────────────────────────────────────────
  function initTabs() {
    document.querySelectorAll('.tab').forEach(function (btn) {
      btn.addEventListener('click', function () { switchTab(btn.dataset.tab); });
    });
  }

  function switchTab(tabId) {
    activeTabId   = tabId;
    selectedRowId = null;

    document.querySelectorAll('.tab').forEach(function (b) {
      var on = b.dataset.tab === tabId;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });

    var cp = $('commsPanel');
    if (cp) cp.innerHTML = '';

    renderActiveTab();
  }

  // ── Data loading ──────────────────────────────────────────────────────
  function loadDashboard() {
    showLoading();
    if (typeof google !== 'undefined' && google.script) {
      google.script.run
        .withSuccessHandler(onDataLoaded)
        .withFailureHandler(onDataError)
        .getDashboardData();
    } else {
      setTimeout(function () {
        onDataLoaded({ systemHealth: { version: 'v4.2.1-RELEASE', authenticatedAs: 'MIM-ADMIN-01', apiLatency: '12MS', uptime: '99.98%', logRate: '12.4K/S' } });
      }, 500);
    }
  }
  window.loadDashboard = loadDashboard;

  function onDataLoaded(data) {
    updateFooter(data.systemHealth || {});
    showDashboard();
  }

  function onDataError(err) {
    showError(err && err.message ? err.message : 'Failed to load dashboard data.');
  }

  // ── Render active tab ─────────────────────────────────────────────────
  function renderActiveTab() {
    var tab = TABS.find(function (t) { return t.id === activeTabId; });
    if (!tab) return;

    // Subheader label
    var labelEl = $('activeTabLabel');
    if (labelEl) labelEl.textContent = tab.label;

    // Incidents for this tab
    var incidents = MOCK_INCIDENTS[activeTabId] || [];
    var activeCount = incidents.filter(function (i) { return isActive(i.status); }).length;

    var countEl = $('activeTabCount');
    if (countEl) countEl.textContent = activeCount + ' active';

    var badgeEl = $('activeBadge');
    if (badgeEl) badgeEl.textContent = activeCount + ' ACTIVE';

    // Analytics header labels
    var kpiEl = $('kpiTag');     if (kpiEl) kpiEl.textContent = tab.kpi;
    var ctEl  = $('chartTitle'); if (ctEl)  ctEl.textContent  = tab.chartTitle;
    var rdEl  = $('rawDataTitle'); if (rdEl) rdEl.textContent = tab.rawTitle;

    renderIncidentTable(incidents);

    // Start live age ticker (refresh every 60 s)
    clearInterval(ageIntervalId);
    ageIntervalId = setInterval(function () { refreshEscalationAges(); }, 60000);

    if (analyticsInited) applyAnalyticsFilter(activePeriod);
  }

  // ── Incident table ────────────────────────────────────────────────────
  function renderIncidentTable(incidents) {
    var tbody = $('liveEscTbody');
    if (!tbody) return;
    var now = Date.now();

    if (!incidents.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">No escalations for this category.</td></tr>';
      return;
    }

    tbody.innerHTML = incidents.map(function (inc) {
      var age   = calcEscalationAge(inc.createdAt, now);
      var active = isActive(inc.status);
      var fc    = fmrClass(inc.fmr);
      return '<tr data-id="' + esc(inc.id) + '" data-created="' + esc(inc.createdAt) + '" tabindex="0"' +
             (selectedRowId === inc.id ? ' class="selected"' : '') + '>' +
        '<td class="bold">' + esc(inc.requestingPoc) + '</td>' +
        '<td class="mono">' + esc(inc.ticketId) + '</td>' +
        '<td>' +
          '<span class="product-area">' + esc(inc.productArea) + '</span> ' + severityBadge(inc.severity) +
        '</td>' +
        '<td>' + statusCell(inc.status) + '</td>' +
        '<td>' + esc(inc.customerName) + '<span class="svc-level"> / ' + esc(inc.serviceLevel) + '</span></td>' +
        '<td class="text-right"><button class="btn-log" data-id="' + esc(inc.id) + '" data-ticket="' + esc(inc.ticketId) + '" aria-label="Open comms log for ' + esc(inc.ticketId) + '">OPEN LOG</button></td>' +
        '<td><span class="fmr-cell ' + fc + '">' + esc(inc.fmr || '—') + '</span></td>' +
        '<td><span class="age-cell' + (active ? ' age-active' : '') + '">' + esc(age) + '</span></td>' +
      '</tr>';
    }).join('');

    // Row click → inline comms; button click → modal
    tbody.querySelectorAll('tr[data-id]').forEach(function (row) {
      row.addEventListener('click', function (e) {
        if (e.target.classList.contains('btn-log')) return;
        selectRow(row.dataset.id);
      });
      row.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') selectRow(row.dataset.id);
      });
    });
    tbody.querySelectorAll('.btn-log').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        openLogModal(btn.dataset.id, btn.dataset.ticket);
      });
    });
  }

  // Refresh only the age cells without full re-render
  function refreshEscalationAges() {
    var now = Date.now();
    var tbody = $('liveEscTbody');
    if (!tbody) return;
    tbody.querySelectorAll('tr[data-created]').forEach(function (row) {
      var ageEl = row.querySelector('.age-cell');
      if (ageEl) ageEl.textContent = calcEscalationAge(row.dataset.created, now);
    });
  }

  function selectRow(id) {
    selectedRowId = id;
    var tbody = $('liveEscTbody');
    if (tbody) {
      tbody.querySelectorAll('tr[data-id]').forEach(function (r) {
        r.classList.toggle('selected', r.dataset.id === id);
      });
    }
    renderInlineComms(id);
  }

  // ── Inline comms blast ────────────────────────────────────────────────
  function renderInlineComms(incidentId) {
    var panel = $('commsPanel');
    if (!panel) return;

    var inc = findIncident(incidentId);
    if (!inc) return;

    panel.innerHTML = '<div class="comms-panel"><div class="comms-panel-header"><div class="comms-dot"></div>' +
      '<span class="section-label">Latest Comms Blast — ' + esc(inc.ticketId) + '</span></div>' +
      '<div class="comms-panel-body"><div class="state-panel compact"><div class="spinner"></div><p>Loading…</p></div></div></div>';

    if (typeof google !== 'undefined' && google.script) {
      google.script.run
        .withSuccessHandler(function (logs) { renderInlineLog(panel, inc, logs); })
        .withFailureHandler(function ()     { renderInlineLog(panel, inc, buildMockLog(incidentId)); })
        .getCommunicationLog(incidentId);
    } else {
      setTimeout(function () { renderInlineLog(panel, inc, buildMockLog(incidentId)); }, 300);
    }
  }

  function buildMockLog(incidentId) {
    var now = Date.now();
    return [
      { timestamp: new Date(now - 7200000).toISOString(), author: 'system-bot',   message: 'Incident opened. Initial triage in progress.',             audience: 'IEM' },
      { timestamp: new Date(now - 5400000).toISOString(), author: 'IEM Desk',     message: 'Comms bridge established. Stakeholders notified.',           audience: 'Executive' },
      { timestamp: new Date(now - 3600000).toISOString(), author: 'MIM-ADMIN-01', message: 'Root cause identified. Mitigation steps underway.',          audience: 'IEM' },
      { timestamp: new Date(now -  900000).toISOString(), author: 'MIM-ADMIN-01', message: 'Mitigation 80% complete. Monitoring for full recovery.',      audience: 'Executive' }
    ];
  }

  function renderInlineLog(panel, inc, logs) {
    var latest = logs.length ? logs[logs.length - 1] : null;
    var histRows = logs.slice().reverse().map(function (l, i) {
      return '<tr><td class="ts">' + formatTs(l.timestamp) + '</td>' +
             '<td>' + (i === logs.length - 1 ? 'Initial Update' : 'Update #' + (logs.length - 1 - i)) + '</td>' +
             '<td>' + esc(l.author) + '</td></tr>';
    }).join('');

    panel.innerHTML =
      '<div class="comms-panel">' +
        '<div class="comms-panel-header"><div class="comms-dot"></div>' +
          '<span class="section-label">Latest Comms Blast — ' + esc(inc.ticketId) + '</span></div>' +
        '<div class="comms-panel-body">' +
          '<div class="comms-message-box"><p class="comms-message-text">' + esc(latest ? latest.message : 'No communications logged yet.') + '</p></div>' +
          '<div class="comms-meta">' +
            '<span>' + (latest ? 'Sent ' + timeAgo(latest.timestamp) : '—') + '</span>' +
            '<span>BY: ' + esc(latest ? latest.author : '—') + '</span>' +
            '<button class="btn-log" onclick="copyCommsText(\'' + (latest ? latest.message.replace(/\\/g,'\\\\').replace(/'/g,"\\'") : '') + '\')">Copy Text</button>' +
          '</div>' +
          (histRows ? '<div class="comms-history-title">History of Comms</div>' +
            '<table class="comms-history-table"><thead><tr><th>Timestamp</th><th>Type</th><th>IEM POC</th></tr></thead>' +
            '<tbody>' + histRows + '</tbody></table>' : '') +
        '</div>' +
      '</div>';
  }

  window.copyCommsText = function (text) {
    if (navigator.clipboard) navigator.clipboard.writeText(text);
    showToast('Copied to clipboard.');
  };

  // ── Modal ─────────────────────────────────────────────────────────────
  function initModal() {
    $('modalCloseBtn').addEventListener('click', closeModal);
    $('logModalBackdrop').addEventListener('click', function (e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });
  }

  function openLogModal(incidentId, ticketId) {
    $('modalTitle').textContent     = 'Comms Log — ' + ticketId;
    $('modalLoading').style.display = '';
    $('modalError').style.display   = 'none';
    $('modalLog').style.display     = 'none';
    var bd = $('logModalBackdrop');
    bd.style.display = 'flex';
    bd.setAttribute('aria-hidden', 'false');
    $('modalCloseBtn').focus();

    setTimeout(function () { renderModalLog(buildMockLog(incidentId)); }, 400);
  }

  function renderModalLog(logs) {
    $('modalLoading').style.display = 'none';
    var c = $('modalLog');
    c.innerHTML = logs.length ? logs.slice().reverse().map(function (l) {
      return '<div class="log-entry">' +
        '<div class="log-entry-header">' +
          '<span class="log-author">' + esc(l.author) + '</span>' +
          '<span class="log-ts">' + formatTs(l.timestamp) + '</span>' +
          '<span class="log-audience">' + esc(l.audience) + '</span>' +
        '</div>' +
        '<p class="log-message">' + esc(l.message) + '</p>' +
      '</div>';
    }).join('') : '<p style="padding:16px;text-align:center;color:var(--text-faint);font-style:italic;font-size:0.72rem">No communications logged.</p>';
    c.style.display = '';
  }

  function closeModal() {
    var bd = $('logModalBackdrop');
    bd.style.display = 'none';
    bd.setAttribute('aria-hidden', 'true');
  }

  // ── Analytics init + filter ───────────────────────────────────────────
  function initAnalytics() {
    if (analyticsInited) return;
    analyticsInited = true;
    document.querySelectorAll('.timeline-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        activePeriod = btn.dataset.period;
        document.querySelectorAll('.timeline-btn').forEach(function (b) {
          b.classList.toggle('active', b.dataset.period === activePeriod);
        });
        applyAnalyticsFilter(activePeriod);
      });
    });
    applyAnalyticsFilter(activePeriod);
  }

  function applyAnalyticsFilter(period) {
    var monthly = MOCK_MONTHLY[activeTabId] || [];
    var raw     = MOCK_RAW[activeTabId]     || [];
    var fMonthly = getFilteredMonthly(monthly, period);
    var fRaw     = getFilteredRaw(raw, monthly, period);

    renderComboChart(fMonthly);
    renderRawTable(fRaw);
    updateSloSummary(fMonthly);

    var rcEl = $('rawDataCount');
    if (rcEl) rcEl.textContent = fRaw.length + ' record' + (fRaw.length !== 1 ? 's' : '');
  }

  function getFilteredMonthly(all, period) {
    if (period === 'Q') return aggregateByQuarter(all);
    var n = { '1W': 1, '1M': 1, '3M': 3, '6M': 6, 'Y': 12 }[period] || 3;
    return all.slice(-n);
  }

  function aggregateByQuarter(all) {
    var order = [], map = {};
    all.forEach(function (d) {
      var parts = d.month.split('-');
      var qNum  = Math.ceil(parseInt(parts[1], 10) / 3);
      var label = 'Q' + qNum + '’' + parts[0].slice(2);
      if (!map[label]) { map[label] = { month: label, count: 0, sloSum: 0, n: 0 }; order.push(label); }
      map[label].count  += d.count;
      map[label].sloSum += d.slo;
      map[label].n      += 1;
    });
    return order.map(function (q) {
      var v = map[q];
      return { month: v.month, count: v.count, slo: Math.round(v.sloSum / v.n * 10) / 10 };
    });
  }

  function getFilteredRaw(raw, monthly, period) {
    if (period === 'Q' || period === 'Y') return raw;
    var n = { '1W': 1, '1M': 1, '3M': 3, '6M': 6 }[period] || 3;
    var allowed = monthly.slice(-n).map(function (d) { return d.month; });
    return raw.filter(function (r) { return allowed.indexOf(r.month) !== -1; });
  }

  function updateSloSummary(filtered) {
    var el = $('sloSummary');
    if (!el || !filtered.length) return;
    var avg = filtered.reduce(function (s, d) { return s + d.slo; }, 0) / filtered.length;
    el.textContent = 'Avg SLO: ' + avg.toFixed(1) + '%';
  }

  // ── Chart.js dual-axis combo ──────────────────────────────────────────
  function getChartColors() {
    var dark = document.body.classList.contains('theme-dark');
    return {
      barBg:     dark ? 'rgba(59,130,246,0.72)'  : 'rgba(37,99,235,0.60)',
      barBorder: dark ? 'rgb(59,130,246)'         : 'rgb(37,99,235)',
      lineFg:    dark ? 'rgb(239,68,68)'          : 'rgb(220,38,38)',
      linePtBg:  dark ? '#18181b'                 : '#ffffff',
      gridColor: dark ? 'rgba(39,39,42,0.7)'     : 'rgba(226,232,240,0.8)',
      tickColor: dark ? '#71717a'                 : '#64748b',
      ttBg:      dark ? '#27272a'                 : '#ffffff',
      ttText:    dark ? '#e4e4e7'                 : '#0f172a',
      ttBorder:  dark ? '#3f3f46'                 : '#e2e8f0'
    };
  }

  function renderComboChart(data) {
    var canvas = $('mainChart');
    if (!canvas) return;
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    var c = getChartColors();
    chartInstance = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: data.map(function (d) { return d.month; }),
        datasets: [
          {
            type: 'bar', label: 'Count',
            data: data.map(function (d) { return d.count; }),
            backgroundColor: c.barBg, borderColor: c.barBorder,
            borderWidth: 1, borderRadius: 3, yAxisID: 'yCount', order: 2
          },
          {
            type: 'line', label: 'SLO Compliance %',
            data: data.map(function (d) { return d.slo; }),
            borderColor: c.lineFg, backgroundColor: 'transparent',
            pointBackgroundColor: c.linePtBg, pointBorderColor: c.lineFg,
            pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
            borderWidth: 2, tension: 0.35, yAxisID: 'ySlo', order: 1
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: c.ttBg, titleColor: c.ttText, bodyColor: c.ttText,
            borderColor: c.ttBorder, borderWidth: 1, padding: 10,
            callbacks: {
              label: function (ctx) {
                return ctx.dataset.label === 'SLO Compliance %'
                  ? '  SLO: ' + ctx.parsed.y + '%'
                  : '  Count: ' + ctx.parsed.y;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: c.gridColor },
            ticks: { color: c.tickColor, font: { size: 10, family: "'SF Mono', monospace" } }
          },
          yCount: {
            type: 'linear', position: 'left', beginAtZero: true,
            grid: { color: c.gridColor },
            ticks: { color: c.tickColor, font: { size: 10 }, precision: 0 },
            title: { display: true, text: 'Count', color: c.tickColor, font: { size: 10, weight: '700' } }
          },
          ySlo: {
            type: 'linear', position: 'right', min: 50, max: 100,
            grid: { drawOnChartArea: false },
            ticks: { color: c.lineFg, font: { size: 10 }, callback: function (v) { return v + '%'; } },
            title: { display: true, text: 'SLO %', color: c.lineFg, font: { size: 10, weight: '700' } }
          }
        }
      }
    });
  }

  // ── Raw data table ────────────────────────────────────────────────────
  function renderRawTable(rows) {
    var tbody = $('rawDataTbody');
    if (!tbody) return;
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="padding:28px;text-align:center;color:var(--text-faint);font-style:italic;font-size:0.72rem">No records for selected period.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      return '<tr>' +
        '<td class="rd-month">' + esc(r.month) + '</td>' +
        '<td class="rd-id">' + esc(r.bugId) + '</td>' +
        '<td class="rd-esc">' + esc(r.escalation) + '</td>' +
        '<td class="rd-subject" title="' + esc(r.subject) + '">' + esc(r.subject) + '</td>' +
        '<td class="rd-ts">' + esc(r.created) + '</td>' +
        '<td class="rd-ts">' + esc(r.firstAssign) + '</td>' +
        '<td class="rd-ts">' + esc(r.firstUpdate || '—') + '</td>' +
      '</tr>';
    }).join('');
  }

  // ── Visibility helpers ────────────────────────────────────────────────
  function showLoading() {
    $('loadingState').style.display    = '';
    $('errorState').style.display      = 'none';
    $('dashboardContent').style.display= 'none';
  }
  function showDashboard() {
    $('loadingState').style.display    = 'none';
    $('errorState').style.display      = 'none';
    $('dashboardContent').style.display= '';
    initAnalytics();
    switchTab('EXEC_ESCALATIONS');
  }
  function showError(msg) {
    $('loadingState').style.display    = 'none';
    $('errorState').style.display      = '';
    $('dashboardContent').style.display= 'none';
    $('errorMsg').textContent = msg;
  }

  // ── Footer ────────────────────────────────────────────────────────────
  function updateFooter(h) {
    var l = $('footer-left'), r = $('footer-right');
    if (l && h.version)     l.textContent = h.version + ' | AUTHENTICATED: ' + h.authenticatedAs;
    if (r && h.apiLatency)  r.innerHTML   = 'API: ' + h.apiLatency + ' | <span class="uptime">UPTIME: ' + h.uptime + '</span> | LOG: ' + h.logRate;
  }

  // ── Toast ─────────────────────────────────────────────────────────────
  function showToast(msg) {
    var t = $('toast');
    t.textContent = msg;
    t.style.display = '';
    clearTimeout(t._timer);
    t._timer = setTimeout(function () { t.style.display = 'none'; }, 2800);
  }

  // ── Template helpers ──────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function severityBadge(sev) {
    var s = String(sev || '').toLowerCase();
    var cls = s === 'huge' ? 'badge-sev-huge' : s === 'p0' ? 'badge-sev-p0' : s === 'major' ? 'badge-sev-major' : s === 'p1' ? 'badge-sev-p1' : 'badge-sev-other';
    return '<span class="badge ' + cls + '">' + esc(sev) + '</span>';
  }

  function statusCell(status) {
    var s = String(status || '').toLowerCase();
    var dot = s === 'monitoring' ? 'pulse-dot' : s === 'investigating' ? 'pulse-dot red' : s === 'customer update pending' ? 'pulse-dot amber' : 'pulse-dot static';
    return '<div class="status-cell"><span class="' + dot + '" aria-hidden="true"></span>' + esc(status) + '</div>';
  }

  function formatTs(iso) {
    if (!iso) return '—';
    try {
      var d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
             d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    } catch (e) { return iso; }
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    var diff = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
    if (diff < 1)  return 'just now';
    if (diff < 60) return diff + 'm ago';
    return Math.floor(diff / 60) + 'h ' + (diff % 60) + 'm ago';
  }

  function findIncident(id) {
    var found = null;
    Object.keys(MOCK_INCIDENTS).forEach(function (k) {
      MOCK_INCIDENTS[k].forEach(function (i) { if (i.id === id) found = i; });
    });
    return found;
  }

})();
</script>
