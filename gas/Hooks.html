function deriveStatus(row) {
  var derived;

    derived = 'Closed';

  // Conflict: raw status wins if it differs from derived

  return derived;
}

function formatResolutionAge(hours) {
  if (hours == null || isNaN(hours)) return '—';
  var totalMins = Math.round(Number(hours) * 60);
  if (totalMins < 1)  return '< 1m';
  if (totalMins < 60) return totalMins + 'm';
  var h = Math.floor(totalMins / 60);
  var m = totalMins % 60;
  if (h < 24) return h + 'h' + (m > 0 ? ' ' + m + 'm' : '');
  var d  = Math.floor(h / 24);
  var hr = h % 24;
  return d + 'd' + (hr > 0 ? ' ' + hr + 'h' : '');
}

function formatFmr(mins) {
  if (mins == null || isNaN(mins)) return '—';
  var m = Math.round(Number(mins));
  if (m < 60) return m + 'm';
  var h  = Math.floor(m / 60);
  var rm = m % 60;
  return h + 'h' + (rm > 0 ? ' ' + rm + 'm' : '');
}

/* ══════════════════════════════════════════════════════════════════════
   Hook: useDashboardData
   subscribe(eventName, fn) → unsubscribeFn
   Events: 'change' → fn(data)  |  'error' → fn(errorObj)
══════════════════════════════════════════════════════════════════════ */
var useDashboardData = (function () {
  var _subs = {};
  var _data = null;

  function _emit(ev, payload) {
    (_subs[ev] || []).forEach(function (fn) { try { fn(payload); } catch (e) { console.error(e); } });
  }

  function subscribe(ev, fn) {
    if (!_subs[ev]) _subs[ev] = [];
    _subs[ev].push(fn);
    if (ev === 'change' && _data) fn(_data);   // replay last value
    return function () {
      _subs[ev] = (_subs[ev] || []).filter(function (f) { return f !== fn; });
    };
  }

  /* ── Fetch strategies ──────────────────────────────────────────── */
  function fetch() {
    switch (DATA_ENDPOINT.type) {

      case 'gas':
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler(function (d) { _data = _normaliseGas(d); _emit('change', _data); })
            .withFailureHandler(function (e) { _emit('error', e); })
            .getDashboardData();
        }
        break;

      case 'rest':
        window.fetch(DATA_ENDPOINT.baseUrl + '/incidents', {
          headers: Object.assign({ 'Content-Type': 'application/json' }, DATA_ENDPOINT.headers)
        })
          .then(function (r) { return r.json(); })
          .then(function (d) { _data = _normaliseRest(d); _emit('change', _data); })
          .catch(function (e) { _emit('error', e); });
        break;

      case 'graphql':
        window.fetch(DATA_ENDPOINT.graphqlUrl, {
          method: 'POST',
          headers: Object.assign({ 'Content-Type': 'application/json' }, DATA_ENDPOINT.headers),
          body: JSON.stringify({ query: '{ incidents { bug_id iem_escalation_number current_assignee_ldap product_name priority customer_name subject last_update time_to_first_update_mins resolution_hours created_timestamp closed_timestamp status iem_escalation_type } }' })
        })
          .then(function (r) { return r.json(); })
          .then(function (d) { _data = _normaliseGraphql(d.data); _emit('change', _data); })
          .catch(function (e) { _emit('error', e); });
        break;

      case 'mock':
      default:
        setTimeout(function () {
          _data = { rows: window._MOCK_ROWS, monthly: _MOCK_MONTHLY, raw: _MOCK_RAW };
          _emit('change', _data);
        }, 600);
        break;
    }
  }

  function fetchCommsLog(bugId, cb) {
    switch (DATA_ENDPOINT.type) {
      case 'gas':
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler(cb)
            .withFailureHandler(function () { cb([]); })
            .getCommunicationLog(bugId);
        }
        break;
      case 'rest':
        window.fetch(DATA_ENDPOINT.baseUrl + '/comms/' + encodeURIComponent(bugId), {
          headers: DATA_ENDPOINT.headers
        })
          .then(function (r) { return r.json(); })
          .then(cb)
          .catch(function () { cb([]); });
        break;
      default:
        setTimeout(function () { cb(_MOCK_COMMS[bugId] || _buildFallbackLog()); }, 300);
        break;
    }
  }

  /* ── Normalisers ──────────────────────────────────────────────── */
  function _normaliseGas(d) {
    // Surface any fetch error so the UI can display it.
    if (d._error) {
      console.error('[useDashboardData] GAS error:', d._error);
    }

    // ── New shape: { rows, monthly, raw, systemHealth } from SheetFetchService ──
    if (d.rows && Array.isArray(d.rows)) {
      return {
        rows:         d.rows,
        monthly:      d.monthly      || _MOCK_MONTHLY,
        raw:          d.raw          || _MOCK_RAW,
        systemHealth: d.systemHealth || {}
      };
    }

    // ── Legacy shape: { incidents: [...] } from old providers ──────────────
    var rows = (d.incidents || []).map(function (inc) {
      return {
        bug_id:                    inc.bug_id                    || inc.id          || '',
        iem_escalation_number:     inc.iem_escalation_number     || inc.ticketId    || '',
        current_assignee_ldap:     inc.current_assignee_ldap     || inc.requestingPoc || '',
        product_name:              inc.product_name              || inc.productArea  || '',
        priority:                  inc.priority                  || inc.severity    || '',
        customer_name:             inc.customer_name             || inc.customerName || '',
        subject:                   inc.subject                   || '',
        last_update:               inc.last_update               || '',
        time_to_first_update_mins: inc.time_to_first_update_mins != null ? inc.time_to_first_update_mins : (parseInt(inc.fmr) || 0),
        resolution_hours:          inc.resolution_hours          != null ? inc.resolution_hours : 0,
        created_timestamp:         inc.created_timestamp         || inc.createdAt   || null,
        closed_timestamp:          inc.closed_timestamp          || null,
        status:                    inc.status                    || '',
        iem_escalation_type:       inc.iem_escalation_type       || ''
      };
    });
    return {
      rows:         rows,
      monthly:      d.monthly      || _MOCK_MONTHLY,
      raw:          d.raw          || _MOCK_RAW,
      systemHealth: d.systemHealth || {}
    };
  }

  function _normaliseRest(d) {
    return {
      rows:    d.incidents || d.data || [],
      monthly: d.monthly   || _MOCK_MONTHLY,
      raw:     d.raw       || _MOCK_RAW
    };
  }

  function _normaliseGraphql(d) {
    return { rows: d.incidents || [], monthly: _MOCK_MONTHLY, raw: _MOCK_RAW };
  }

  function _buildFallbackLog() {
    var now = Date.now();
    return [
      { timestamp:new Date(now-7200000).toISOString(), author:'system-bot',   message:'Incident opened. Initial triage in progress.',      audience:'IEM' },
      { timestamp:new Date(now-5400000).toISOString(), author:'IEM Desk',     message:'Comms bridge established. Stakeholders notified.',  audience:'Executive' },
      { timestamp:new Date(now-3600000).toISOString(), author:'MIM-ADMIN-01', message:'Root cause identified. Mitigation underway.',       audience:'IEM' },
      { timestamp:new Date(now- 900000).toISOString(), author:'MIM-ADMIN-01', message:'Mitigation 80% complete. Monitoring for recovery.', audience:'Executive' }
    ];
  }

  return { subscribe: subscribe, fetch: fetch, fetchCommsLog: fetchCommsLog };
}());

/* ══════════════════════════════════════════════════════════════════════
   Hook: useCurrentUser
   subscribe(fn) → unsubscribeFn
   fn called with { name, initials }
══════════════════════════════════════════════════════════════════════ */
var useCurrentUser = (function () {
  var _subs = [];
  var _user = null;

  function subscribe(fn) {
    _subs.push(fn);
    if (_user) fn(_user);
    return function () { _subs = _subs.filter(function (f) { return f !== fn; }); };
  }

  function _emit(u) {
    _user = u;
    _subs.forEach(function (fn) { try { fn(u); } catch (e) { console.error(e); } });
  }

  function fetch() {
    // Priority 1: GAS server-side template var (fastest, no round-trip)
    var gasName = (typeof GAS_USER_NAME !== 'undefined' && GAS_USER_NAME &&
                   GAS_USER_NAME.indexOf('<?') === -1)
                ? GAS_USER_NAME.trim() : '';
    if (gasName) { _emit(_buildUser(gasName)); return; }

    // Priority 2: GAS getCurrentUser() RPC
    if (typeof google !== 'undefined' && google.script) {
      google.script.run
        .withSuccessHandler(function (u) { _emit(u || { name:'IEM Admin', initials:'IA' }); })
        .withFailureHandler(function ()   { _emit({ name:'IEM Admin', initials:'IA' }); })
        .getCurrentUser();
      return;
    }

    // Priority 3: local dev fallback
    _emit({ name:'IEM Admin', initials:'IA' });
  }

  function _buildUser(name) {
    var parts    = name.trim().split(/\s+/).filter(Boolean);
    var initials = parts.length >= 2
      ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
      : name.slice(0, 2).toUpperCase();
    return { name: name, initials: initials };
  }

  return { subscribe: subscribe, fetch: fetch };
}());

  function _emit() {

  }

  function subscribe(fn) {
    _subs.push(fn);

  function markRead(id) {

  function markAllRead() {

  }

  function getItem(id) {
    return _items.filter(function (n) { return n.id === id; })[0] || null;
  }

  function init() { _emit(); }

  return { subscribe: subscribe, markRead: markRead, markAllRead: markAllRead, getItem: getItem, init: init };
}());
